<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ANIMADEX · Admin login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="admin-page">
  <div class="bg-fx"></div>
  <main class="admin-login">
    <h1 class="admin-title">ANIMA<b>DEX</b> · admin</h1>
    {% if error %}<p class="admin-error">{{ error }}</p>{% endif %}
    <form method="post" action="{{ url_for('admin.login') }}"
          class="admin-form">
      <label>Username
        <input type="text" name="username" autocomplete="username"
               autofocus required>
      </label>
      <label>Password
        <input type="password" name="password"
               autocomplete="current-password" required>
      </label>
      <button type="submit">Log in</button>
      <a class="admin-back" href="{{ url_for('pages.index') }}">← back to site</a>
    </form>
  </main>
</body>
</html>
